name: Pruebas de Desempeño (K6)

# Ejecución MANUAL (workflow_dispatch): no forma parte del pipeline principal.
# Levanta Monica + MySQL igual que el job de Cypress y corre los scripts K6,
# publicando los resultados como artifact (evidencia para el Hito 3).
on:
  workflow_dispatch:

jobs:
  k6-performance:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: monica_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: monica_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, gd, zip

      - name: Instalar dependencias Composer
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias NPM y compilar assets
        run: |
          yarn install --frozen-lockfile
          yarn run production

      - name: Copiar archivo de entorno
        run: |
          cp .env.example .env
          sed -i "s#^APP_URL=.*#APP_URL=http://localhost:8000#" .env

      - name: Generar clave de aplicación
        run: php artisan key:generate

      - name: Generar claves de Passport
        run: php artisan passport:keys --force

      - name: Migrar base de datos
        run: php artisan migrate --force

      - name: Levantar servidor Laravel
        run: |
          php artisan serve --port=8000 &
          npx wait-on http://localhost:8000 --timeout 60000

      - name: Instalar K6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: "PS-PERF-001: Smoke test"
        run: k6 run --summary-export=results-smoke.json tests/k6/smoke.js

      - name: "PS-PERF-002: Load test (20 VUs)"
        run: k6 run --summary-export=results-load.json tests/k6/load.js

      - name: Publicar resultados como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: |
            results-smoke.json
            results-load.json
          retention-days: 30
