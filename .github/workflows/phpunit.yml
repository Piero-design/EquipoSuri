name: CI/CD Pipeline - Equipo Suri

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: monica_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, gd, zip
          coverage: xdebug

      - name: Instalar dependencias Composer
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias NPM y compilar assets
        run: |
          yarn install
          yarn run dev

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Generar clave de aplicación
        run: php artisan key:generate

      - name: Generar claves de Passport para pruebas API
        run: php artisan passport:keys --force

      - name: Configurar base de datos de testing
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: monica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Crear carpeta de reportes
        run: mkdir -p reports/phpunit reports/coverage

      - name: Ejecutar suite de pruebas PHPUnit y generar reportes
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: monica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          vendor/bin/phpunit \
            --log-junit reports/phpunit/phpunit-junit.xml \
            --coverage-html reports/coverage \
            --coverage-clover reports/phpunit/clover.xml \
            --testdox \
            --colors=always || true

      - name: Publicar reportes de PHPUnit como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-reports
          path: |
            reports/phpunit
            reports/coverage

      - name: Levantar servidor Laravel local
        env:
          APP_URL: http://127.0.0.1:8000
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: monica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Esperar a que el servidor local responda
        run: npx wait-on http://127.0.0.1:8000

      - name: Ejecutar pruebas E2E con Cypress
        run: yarn run e2e || true

      - name: Publicar reportes Cypress como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: |
            results/junit/cypress
            tests/cypress/screenshots
            tests/cypress/videos
          if-no-files-found: ignore

  deploy-coverage:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Descargar artefacto de cobertura
        uses: actions/download-artifact@v4
        with:
          name: phpunit-reports
          path: reportes

      - name: Publicar cobertura en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reportes/reports/coverage
          destination_dir: coverage
          keep_files: true
