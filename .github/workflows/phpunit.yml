name: PHPUnit CI/CD - Equipo Suri

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: monica_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, gd, zip
          coverage: xdebug

      - name: Instalar dependencias Composer
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Generar clave de aplicación
        run: php artisan key:generate

      - name: Generar claves de Passport para pruebas API
        run: php artisan passport:keys --force

      - name: Configurar base de datos de testing
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: monica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Ejecutar suite de pruebas PHPUnit
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: monica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/phpunit --testdox --colors=always

      - name: Generar reporte de cobertura
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: monica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/phpunit --coverage-text --colors=always || true
